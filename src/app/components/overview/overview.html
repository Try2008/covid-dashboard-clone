<div class="card kpi-card">
  <div class="header">
    <div class="title no-padding">
      <h3 class="title-header">{{ title }}</h3>
    </div>
    <div class="info">
      <span class="info-icon" [title]="tooltipText" aria-label="מידע נוסף">ⓘ</span>
    </div>
  </div>

  <div class="body">
    <div class="kpi-lines">
      @if (mainValue !== null) {
        <div class="line main-line">
          <h4 class="bold data-number main">{{ mainValue }}</h4>
        </div>
      }
      @for (row of subRows; track row.label) {
        <div class="line">
          <h4 class="bold data-number small">{{ row.value }}</h4>
          <span class="label">{{ row.label }}</span>
        </div>
      }
    </div>
  </div>
</div>
