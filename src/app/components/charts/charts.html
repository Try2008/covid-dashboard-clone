<div class="chart-card">
  <div class="chart-head">
    <h3 class="chart-title">{{ title }}</h3>
    @if (subtitle) {
      <p class="chart-subtitle">{{ subtitle }}</p>
    }
  </div>

  <div class="chart-body">
    <highcharts-chart
      [options]="options"
      [style.height.px]="height"
      style="width: 100%; display: block;"
    ></highcharts-chart>
  </div>
</div>
