<div class="header-wrapper notAnchor">
  <div class="loading-line">
    <div class="line active"></div>
  </div>

  <div class="header-container">
    <div class="logo-container">
      <button class="hamburger" aria-label="תפריט">
        <span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="3" y1="6"  x2="21" y2="6"  stroke="#222b45" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="12" x2="21" y2="12" stroke="#222b45" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="18" x2="21" y2="18" stroke="#222b45" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>

      <div class="logo-wrapper">
        <a href="/" class="logo-link" aria-label="עולם הדאטה">
          <img
            class="logo"
            src="https://datadashboard.health.gov.il/assets/images/logo_new.png"
            alt="לוגו משרד הבריאות"
            width="39"
            height="40"
          />
        </a>
      </div>
    </div>

    <h1 class="title-container">עולם הדאטה</h1>

    <div class="left-container"></div>

    <div class="icons-container">
      <button class="icon-btn" aria-label="language change">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 10h18M9 5v14"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="מצב כהה" (click)="toggleDark()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
